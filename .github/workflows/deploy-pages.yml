name: Deploy to GitHub Pages

# Builds the Vite site with the base path set to the repo name (project pages
# are served from https://<user>.github.io/<repo>/) and publishes it to Pages.
# Vercel deploys the same repo independently at the domain root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one in-flight deploy at a time; let a newer push cancel an older run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc -b
      - name: Build (base = /<repo>/ so asset() paths resolve on the subpath)
        run: npx vite build --base="/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
